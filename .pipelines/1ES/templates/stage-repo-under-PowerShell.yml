parameters:
  - name: cleanFirst
    type: boolean
    default: true

# Stages the checked-out repository contents into a `PowerShell\` subfolder so that
# all script paths inherited from the OneBranch templates (which reference
# `$(Build.SourcesDirectory)\PowerShell\...` and `$env:REPOROOT/PowerShell/...`) keep
# resolving correctly without rewriting every callsite.
#
# Why this helper exists
# ----------------------
# OneBranch's default checkout puts the repo at `<sources>\PowerShell` and exposes the
# parent as `$(Build.SourcesDirectory)`. 1ES PT's default checkout puts the repo at
# `$(Build.SourcesDirectory)` directly. Two ways to bridge the gap:
#   (a) Rewrite every `\PowerShell\` path in every script (large surface).
#   (b) Materialise a `\PowerShell\` subfolder at job start (small surface).
# We pick (b) for the initial migration to keep the diff reviewable. A follow-up cleanup
# pass can collapse the indirection once Official is also green.
#
# Why `git worktree add`, not Copy-Item or `git clone`
# ---------------------------------------------------
# OneBranch's `cloneToOfficialPath.yml` does a real `git clone $env:REPOROOT $nativePath`
# because source and dest are SIBLING folders there. In 1ES PT, source
# ($(Build.SourcesDirectory)) is the PARENT of dest — `git clone <parent> <parent>/PowerShell`
# would try to copy the source repo INCLUDING the destination subfolder we're creating.
#
# Our v1 used Copy-Item with `-Exclude '.git'`, but that left the staged path WITHOUT a
# .git directory. Two real problems came from that (build #686007):
#
#   1. `Start-PSBuild` runs `git clean -fdX --exclude src/Modules/nuget.config --exclude
#      nuget.config` in the staged path. `git clean` walks up to find the nearest .git
#      (which becomes `$(Build.SourcesDirectory)/.git` — a DIFFERENT repo's index that
#      knows nothing about files under `PowerShell/`). Every staged file therefore looks
#      "untracked" to git, and `git clean -fdX` removes anything matching .gitignore.
#      The killer case: `tools/wix/nuget.config` is TRACKED in HEAD but ALSO matches the
#      `nuget.config` pattern in .gitignore (line 110). In a real git workspace, tracked
#      files are NEVER removed by `git clean -fdX`. In our staged-without-.git copy,
#      they WERE — wiping the `dotnet-eng` feed declaration that `Microsoft.Signed.Wix`
#      restore depends on. (Failure was: `error NU1101: Unable to find package
#      Microsoft.Signed.Wix. No packages exist with this id in source(s): powershell`.)
#
#   2. `Switch-PSNugetConfig` -> `New-NugetConfigFile` runs `git update-index
#      --skip-worktree` against regenerated nuget.config files. Without .git in the
#      staged path, git fails benignly and we had to add a `$global:LASTEXITCODE = 0`
#      workaround in `insert-nuget-config-azfeed.yml`. With a real worktree, that
#      workaround becomes unnecessary.
#
# `git worktree add --detach $dst HEAD` solves both:
#   - Creates $dst as a REAL git workspace sharing the parent's .git database
#     (via a tiny `.git` POINTER file, not a copy of the object store — very fast).
#   - `--detach` avoids the "branch already checked out in parent worktree" error
#     that would otherwise occur because $src is on the same branch.
#   - Downstream `git` commands (clean, update-index, describe, rev-parse) all behave
#     identically to OneBranch's real-clone semantics.
#
# Also sets $env:REPOROOT for downstream consumers (SetVersionVariables.yml /
# set-reporoot.yml / insert-nuget-config-azfeed.yml all probe $env:REPOROOT or fall back
# to `./PowerShell/build.psm1`).

steps:
- pwsh: |
    $ErrorActionPreference = 'Stop'
    $src = '$(Build.SourcesDirectory)'
    $dst = Join-Path $src 'PowerShell'

    # Compile-time template expansion: `${{ parameters.cleanFirst }}` renders the
    # YAML boolean as the literal string `True` or `False` (capitalised, no sigil).
    # Wrapping in single quotes turns it into a comparable string — DO NOT leave
    # it bare (`if (${{ parameters.cleanFirst }} ...)` would try to invoke a
    # cmdlet named `True` and fail with "term not recognized"; this was the
    # cause of every Linux Stage-repo failure in build #686007).
    if ('${{ parameters.cleanFirst }}' -ieq 'True') {
      if (Test-Path $dst) {
        # If $dst is a registered worktree, unregister it cleanly first; otherwise
        # `git worktree add` below will refuse to recreate it.
        & git -C $src worktree remove --force $dst 2>$null
        if (Test-Path $dst) {
          Remove-Item -Path $dst -Recurse -Force
        }
      }
      # Always prune (even when $dst was already gone) — an orphaned
      # $src/.git/worktrees/PowerShell registration from a prior aborted run
      # would otherwise block `git worktree add`.
      & git -C $src worktree prune 2>$null
    }

    # Materialise <sources>/PowerShell as a REAL git worktree sharing the parent's
    # .git database. See the file header comment for the full rationale; the short
    # version is: downstream scripts (Start-PSBuild's `git clean -fdX`,
    # Switch-PSNugetConfig's `git update-index --skip-worktree`) assume the staged
    # path is a git workspace, and silently corrupt the build when it isn't.
    & git -C $src worktree add --detach $dst HEAD
    if ($LASTEXITCODE -ne 0) {
      throw "git worktree add failed with exit code $LASTEXITCODE"
    }

    # Verify critical files made it across — surface partial-checkout failures NOW
    # rather than letting downstream scripts fail with confusing "file not found"
    # errors at build time. `tools/wix/nuget.config` is explicitly guarded because
    # it's the canary for the "staged repo isn't a git workspace" regression.
    $required = @(
      Join-Path $dst 'build.psm1'
      Join-Path $dst '.config/tsaoptions.json'
      Join-Path $dst '.config/suppress.json'
      Join-Path $dst 'tools/wix/nuget.config'
      Join-Path $dst '.globalconfig'
    )
    foreach ($p in $required) {
      if (-not (Test-Path $p)) {
        throw "Staged repo is missing required file: $p"
      }
    }

    # Neutralise the PARENT `.globalconfig` to prevent a Roslyn
    # `MultipleGlobalAnalyzerKeys` conflict with the WORKTREE `.globalconfig`.
    #
    # Why
    # ---
    # In OneBranch, the repo is at <sources>/<source-folder>/PowerShell — the parent
    # `<sources>/<source-folder>` does NOT contain a copy of the repo, so only ONE
    # `.globalconfig` ever exists in the ancestor chain of a project file.
    #
    # In 1ES PT, `checkout: self` puts the repo at $(Build.SourcesDirectory) directly.
    # The `git worktree add` above then materialises a SECOND working copy at
    # $(Build.SourcesDirectory)/PowerShell. Both now contain `.globalconfig` at their
    # root. When Roslyn auto-discovers config files for a project at
    # `$(Build.SourcesDirectory)/PowerShell/src/<project>/<project>.csproj`, it walks
    # UP the directory tree and picks up BOTH files. Per Roslyn's
    # `EditorConfigParser` rules, when two global-analyzer-config files set the
    # SAME key for a project, Roslyn UNSETS that key and emits a
    # `MultipleGlobalAnalyzerKeys` warning. With every `dotnet_diagnostic.SA*.severity = none`
    # suppression unset, every StyleCop rule fires at default severity (warning),
    # and `TreatWarningsAsErrors=true` in PowerShell.Common.props escalates them
    # to errors. Build #686027 saw ~100K SA* errors across Linux, Windows symbols,
    # and TestArtifacts jobs as a direct result.
    #
    # Why rename instead of delete
    # ----------------------------
    # `.globalconfig.disabled-by-stage-repo` is not auto-discovered (Roslyn only
    # matches the literal name `.globalconfig`), but it remains on disk for any
    # post-mortem inspection. Renaming is reversible; deletion is not.
    #
    # `.editorconfig` is NOT renamed — the worktree copy has `root = true` (see
    # `.editorconfig:10`), so the ancestor walk stops at the worktree root and the
    # parent copy is never read.
    #
    # `nuget.config` is NOT renamed. NuGet does layer/merge package-source
    # config from machine -> user -> root-to-leaf project configs, but the
    # repo's `nuget.config` at the worktree root has `<clear />` inside
    # `<packageSources>` and `<disabledPackageSources>`, which neutralises any
    # inherited sources (including the parent checkout's identical copy). So
    # the merge is harmless in practice.
    $parentGlobalConfig = Join-Path $src '.globalconfig'
    if (Test-Path $parentGlobalConfig) {
      $disabledName = '.globalconfig.disabled-by-stage-repo'
      $disabledPath = Join-Path $src $disabledName
      if (Test-Path $disabledPath) {
        Remove-Item -Path $disabledPath -Force
      }
      Rename-Item -Path $parentGlobalConfig -NewName $disabledName -Force
      Write-Verbose -Verbose "Renamed parent .globalconfig -> $disabledName to prevent Roslyn MultipleGlobalAnalyzerKeys conflict with worktree copy at $dst/.globalconfig"
    } else {
      Write-Verbose -Verbose "Parent $src/.globalconfig not present — nothing to neutralise (unexpected, since `checkout: self` should have produced it; continuing anyway)."
    }

    # Defensive sanity check: confirm exactly ONE .globalconfig is now visible to
    # the worktree's project ancestors AND it is the worktree copy at $dst/.globalconfig.
    # Walks up from a sample project directory; all projects under $dst/src share the
    # same upper ancestor chain, so a single project is representative.
    $sampleProjectDir = Join-Path $dst 'src/System.Management.Automation'
    if (Test-Path $sampleProjectDir) {
      $found = @()
      $cur = (Get-Item $sampleProjectDir).FullName
      while ($cur) {
        $candidate = Join-Path $cur '.globalconfig'
        if (Test-Path $candidate) { $found += $candidate }
        $parent = Split-Path -Path $cur -Parent
        if (-not $parent -or $parent -eq $cur) { break }
        $cur = $parent
      }
      Write-Verbose -Verbose ("Ancestor .globalconfig walk from {0} found {1} file(s): {2}" -f $sampleProjectDir, $found.Count, ($found -join '; '))
      $expectedGlobalConfig = (Get-Item (Join-Path $dst '.globalconfig')).FullName
      if ($found.Count -ne 1) {
        throw ("MultipleGlobalAnalyzerKeys risk: expected exactly 1 .globalconfig in worktree project ancestors, found {0}: {1}" -f $found.Count, ($found -join '; '))
      }
      if ($found[0] -ne $expectedGlobalConfig) {
        throw ("Unexpected .globalconfig location: expected '{0}', found '{1}'" -f $expectedGlobalConfig, $found[0])
      }
    }

    # Expose REPOROOT for downstream helper templates (SetVersionVariables, etc.).
    Write-Host "##vso[task.setvariable variable=REPOROOT]$dst"
    Write-Verbose -Verbose "Repository staged at $dst (git worktree from $src)"
  displayName: 'Stage repo into $(Build.SourcesDirectory)\PowerShell (git worktree, OneBranch path parity)'
