# 1ES-specific translation of /.pipelines/templates/insert-nuget-config-azfeed.yml.
#
# WHY A 1ES-LOCAL COPY EXISTS:
# The shared template's only adjustment we need is the `Capture VSS* Environment`
# task being marked `continueOnError: true` — see Gotcha #10 below. Beyond that
# this template is intentionally a near-verbatim port. Originally it also worked
# around a `git update-index --skip-worktree` failure that came from the staged
# repo not being a real git workspace, but that root cause is now fixed in
# `stage-repo-under-PowerShell.yml` (uses `git worktree add` instead of Copy-Item),
# so the `$global:LASTEXITCODE = 0` workaround was removed.
#
# Gotcha #10: macOS hosted pwsh occasionally fails to start with
#   `Call to 'procargs' failed with errno 5` thrown from
#   `Microsoft.PowerShell.ManagedPSEntry.AttemptExecPwshLogin`
# This is an intermittent libproc race on the macOS-latest hosted image and has
# nothing to do with our script. Because the `Capture VSS* Environment` task is
# purely diagnostic (`Get-ChildItem env:VSS*`), losing it on a rare failure is
# strictly better than failing the whole macOS BUILD job. Hence `continueOnError`.

parameters:
- name: "repoRoot"
  default: $(REPOROOT)
- name: "ob_restore_phase"
  type: boolean
  default: true

steps:
- task: NuGetAuthenticate@1
  displayName: Install Azure Artifacts Credential Provider
  inputs:
    forceReinstallCredentialProvider: true

- pwsh: |
    try {
      $configPath = "${env:NugetConfigDir}/nuget.config"
      Import-Module ${{ parameters.repoRoot }}/build.psm1 -Force

      Write-Verbose -Verbose "Running: Switch-PSNugetConfig -Source Private -UserName '$(AzDevopsFeedUserNameKVPAT)' -ClearTextPAT '<redacted>'"
      Switch-PSNugetConfig -Source Private -UserName '$(AzDevopsFeedUserNameKVPAT)' -ClearTextPAT '$(powershellPackageReadPat)'

      if(-not (Test-Path $configPath))
      {
          throw "nuget.config is not created"
      }
    }
    catch {
      Get-Error
      throw
    }
  displayName: 'Switch to production Azure DevOps feed for all nuget.configs'
  condition: and(succeededOrFailed(), ne(variables['UseAzDevOpsFeed'], ''))
  env:
    NugetConfigDir: ${{ parameters.repoRoot }}/src/Modules
    ob_restore_phase: ${{ parameters.ob_restore_phase }}

- pwsh: |
    Get-ChildItem ${{ parameters.repoRoot }}/nuget.config -Recurse | Foreach-Object {
      Write-Verbose -Verbose "--- START $($_.fullname) ---"
      get-content $_.fullname  | Out-String -width 9999 -Stream | write-Verbose -Verbose
      Write-Verbose -Verbose "--- END $($_.fullname) ---"
    }
  displayName: 'Capture all nuget.config files'
  condition: and(succeededOrFailed(), ne(variables['UseAzDevOpsFeed'], ''))
  env:
    ob_restore_phase: ${{ parameters.ob_restore_phase }}

- pwsh: |
    Get-ChildItem -Path env:VSS* | Out-String -width 9999 -Stream | write-Verbose -Verbose
  displayName: Capture VSS* Environment
  condition: and(succeededOrFailed(), ne(variables['UseAzDevOpsFeed'], ''))
  # Diagnostic-only task; never fail the build if hosted pwsh flakes (see Gotcha #10 above).
  # Retry first to maximise the odds of actually getting the diagnostic output before
  # falling back to continueOnError when the procargs race persists.
  retryCountOnTaskFailure: 2
  continueOnError: true
  env:
    ob_restore_phase: ${{ parameters.ob_restore_phase }}
