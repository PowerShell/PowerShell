parameters:
  binPath: '$(ob_outputDirectory)'
  globalTool: 'false'
  SigningProfile: 'external_distribution'
  OfficialBuild: false
  vPackScenario: false

# 1ES PT translation of /.pipelines/templates/obp-file-signing.yml — HYBRID STUB/TEST-SIGNING.
#
# TWO RUN MODES, selected at queue time by whether the runtime variable
# `EsrpTestConnectionName` is defined (typically via attaching the
# `EsrpSigningTest-PowerShell` variable group at the pipeline level):
#
#   * STUB MODE (default — variable undefined): the original
#     `task: onebranch.pipeline.signing@1` calls are replaced with
#     `pwsh: Write-Host` placeholders. Pipeline runs end-to-end and emits
#     UNSIGNED artifacts. This is the safe default for the rebuild branch
#     and for any contributor without ESRP onboarding.
#
#   * TEST SIGNING MODE (variable group attached): real `EsrpCodeSigning@5`
#     tasks fire against the MS-Sign Test KeyCodes (https://aka.ms/keycodes —
#     auth-gated). Auth is via federated managed identity (no PFX cert in
#     pipeline). Requires the linked AAD app registration to be onboarded to
#     the ESRP TEST ring AND authorised for these specific KeyCodes.
#
# Variable group `EsrpSigningTest-PowerShell` (to be created by repo admin and
# linked to the pipeline definition before queueing in TEST SIGNING MODE):
#   EsrpTestConnectionName     - ADO federated MI service-connection name
#   EsrpTestAppRegClientId     - AAD app reg client ID for the connection
#   EsrpTestAppRegTenantId     - AAD tenant ID
#   EsrpTestAuthAkvName        - KeyVault holding auth cert
#   EsrpTestAuthCertName       - Auth cert name in KeyVault
#   EsrpTestAuthSignCertName   - Signing cert name in KeyVault
#
# Test KeyCode mapping (this file):
#   1st-party Authenticode (was external_distribution / PROD CP-230012)
#     -> TEST CP-466277  (RSA 2048 SHA256 Test 2; same across regions; Lifetime EKU)
#   3rd-party Authenticode (was $(msft_3rd_party_cert_id) / PROD CP-231522)
#     -> TEST CP-466279  (RSA 3072 SHA256 Test 2; same across regions; Lifetime EKU)
#
# Final PROD swap when AME onboarding completes (will be Phase B):
#   1. Grep "CP-466277" -> replace with "CP-230012"
#   2. Grep "CP-466279" -> replace with "CP-231522"
#   3. Switch variable group from EsrpSigningTest-PowerShell to the prod equivalent
#   4. Delete the STUB branches if you want to require real signing for every run
#
# NuGet (CP-401405) and Apple (CP-401337-Apple) signing remain STUB-ONLY — no
# confirmed NuGet/Apple test KeyCodes available in the test inventory. See
# windows-hosted-build.yml and mac.yml for those sites.
#
# Predicate note: the 3rd-party detection block below (~line 142) uses regex
# patterns tuned for Microsoft PROD issuers. Test signatures from
# "Microsoft RSA Testing PCA 2020" still satisfy the `testCert` regex so the
# round-trip will exercise both 1st- and 3rd-party signing paths in TEST mode.
# See files/onebranch-to-1es-migration.md Gotcha #15 for full details.

steps:
- pwsh: |
    $fullSymbolsFolder = '${{ parameters.binPath }}'
    Write-Verbose -Verbose "fullSymbolsFolder == $fullSymbolsFolder"
    Get-ChildItem -Recurse $fullSymbolsFolder | Select-Object -ExpandProperty FullName | Write-Verbose -Verbose
    $filesToSignDirectory = "$(Pipeline.Workspace)/toBeSigned"
    if ((Test-Path -Path $filesToSignDirectory))  {
      Remove-Item -Path $filesToSignDirectory -Recurse -Force
    }
    $null = New-Item -ItemType Directory -Path $filesToSignDirectory -Force

    $itemsToCopyWithRecurse = @(
      "$($fullSymbolsFolder)/*.ps1"
      "$($fullSymbolsFolder)/Microsoft.PowerShell*.dll"
    )
    $itemsToCopy = @{
      "$($fullSymbolsFolder)/*.ps1" = ""
      "$($fullSymbolsFolder)/Modules/Microsoft.PowerShell.Host/Microsoft.PowerShell.Host.psd1" = "Modules/Microsoft.PowerShell.Host"
      "$($fullSymbolsFolder)/Modules/Microsoft.PowerShell.Management/Microsoft.PowerShell.Management.psd1" = "Modules/Microsoft.PowerShell.Management"
      "$($fullSymbolsFolder)/Modules/Microsoft.PowerShell.Security/Microsoft.PowerShell.Security.psd1" = "Modules/Microsoft.PowerShell.Security"
      "$($fullSymbolsFolder)/Modules/Microsoft.PowerShell.Utility/Microsoft.PowerShell.Utility.psd1" = "Modules/Microsoft.PowerShell.Utility"
      "$($fullSymbolsFolder)/pwsh.dll" = ""
      "$($fullSymbolsFolder)/System.Management.Automation.dll" = ""
    }
    ## Windows only modules
    if('$(ArtifactPlatform)' -eq 'windows') {
      $itemsToCopy += @{
        "$($fullSymbolsFolder)/pwsh.exe" = ""
        "$($fullSymbolsFolder)/Microsoft.Management.Infrastructure.CimCmdlets.dll" = ""
        "$($fullSymbolsFolder)/Microsoft.WSMan.*.dll" = ""
        "$($fullSymbolsFolder)/Modules/CimCmdlets/CimCmdlets.psd1" = "Modules/CimCmdlets"
        "$($fullSymbolsFolder)/Modules/Microsoft.PowerShell.Diagnostics/Diagnostics.format.ps1xml" = "Modules/Microsoft.PowerShell.Diagnostics"
        "$($fullSymbolsFolder)/Modules/Microsoft.PowerShell.Diagnostics/Event.format.ps1xml" = "Modules/Microsoft.PowerShell.Diagnostics"
        "$($fullSymbolsFolder)/Modules/Microsoft.PowerShell.Diagnostics/GetEvent.types.ps1xml" = "Modules/Microsoft.PowerShell.Diagnostics"
        "$($fullSymbolsFolder)/Modules/Microsoft.PowerShell.Security/Security.types.ps1xml" = "Modules/Microsoft.PowerShell.Security"
        "$($fullSymbolsFolder)/Modules/Microsoft.PowerShell.Diagnostics/Microsoft.PowerShell.Diagnostics.psd1" = "Modules/Microsoft.PowerShell.Diagnostics"
        "$($fullSymbolsFolder)/Modules/Microsoft.WSMan.Management/Microsoft.WSMan.Management.psd1" = "Modules/Microsoft.WSMan.Management"
        "$($fullSymbolsFolder)/Modules/Microsoft.WSMan.Management/WSMan.format.ps1xml" = "Modules/Microsoft.WSMan.Management"
        "$($fullSymbolsFolder)/Modules/PSDiagnostics/PSDiagnostics.ps?1" = "Modules/PSDiagnostics"
      }
    }

    $itemsToExclude = @(
      # This package is retrieved from https://www.github.com/powershell/MarkdownRender
      "$($fullSymbolsFolder)/Microsoft.PowerShell.MarkdownRender.dll"
    )

    if('$(ArtifactPlatform)' -eq 'linux' -or '$(ArtifactPlatform)' -eq 'macos') {
      $itemsToExclude += "$($fullSymbolsFolder)/pwsh"
    }

    Write-Verbose -verbose "recursively copying $($itemsToCopyWithRecurse | out-string) to $filesToSignDirectory"
    Copy-Item -Path $itemsToCopyWithRecurse -Destination $filesToSignDirectory -Recurse -verbose -exclude $itemsToExclude
    Write-Verbose -verbose "recursive copy done."

    foreach($pattern in $itemsToCopy.Keys) {
      $destinationFolder = Join-Path $filesToSignDirectory -ChildPath $itemsToCopy.$pattern
      $null = New-Item -ItemType Directory -Path $destinationFolder -Force
      Write-Verbose -verbose "copying $pattern to $destinationFolder"

      if (-not (Test-Path -Path $pattern)) {
        Write-Verbose -verbose "No files found for pattern $pattern"
        continue
      }

      Copy-Item -Path $pattern -Destination $destinationFolder -Recurse -verbose
    }

    Write-Verbose -verbose "copying done."
    Write-Verbose -verbose "Files to be signed at: $filesToSignDirectory"

    Get-ChildItem -Recurse -File $filesToSignDirectory | Select-Object -Property FullName
  displayName: 'Prepare files to be signed'

# PROD SIGNING (1st-party): emitted ONLY for the Official pipeline
# (OfficialBuild: true). Real ESRP Authenticode signing via the production
# service connection PowerShell-ESRP-Release against PROD KeyCode CP-230012
# (was profile `external_distribution`). Auth inputs (AppReg/AKV/cert) come from
# the `EsrpSigning-PowerShell` variable group declared in the Official entry.
# This block is compile-time excluded from the NonOfficial pipeline so the prod
# connection is never referenced there (avoids the Production Readiness Check).
- ${{ if eq(parameters.OfficialBuild, true) }}:
  - task: EsrpCodeSigning@5
    displayName: 'Sign 1st party files (ESRP prod signing)'
    condition: succeeded()
    inputs:
      ConnectedServiceName: PowerShell-ESRP-Release
      AppRegistrationClientId: $(EsrpProdAppRegClientId)
      AppRegistrationTenantId: $(EsrpProdAppRegTenantId)
      AuthAKVName: $(EsrpProdAuthAkvName)
      AuthSignCertName: $(EsrpProdAuthSignCertName)
      UseMSIAuthentication: true
      FolderPath: $(Pipeline.Workspace)/toBeSigned
      Pattern: '**/*.psd1,**/*.psm1,**/*.ps1xml,**/*.ps1,**/*.dll,**/*.exe,**/pwsh'
      UseMinimatch: true
      signConfigType: inlineSignParams
      inlineOperation: |
        [
          {
            "keyCode": "CP-230012",
            "operationSetCode": "SigntoolSign",
            "parameters": [
              { "parameterName": "OpusName", "parameterValue": "Microsoft" },
              { "parameterName": "OpusInfo", "parameterValue": "http://www.microsoft.com" },
              { "parameterName": "PageHash", "parameterValue": "/NPH" },
              { "parameterName": "FileDigest", "parameterValue": "/fd \"SHA256\"" },
              { "parameterName": "TimeStamp", "parameterValue": "/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256" }
            ],
            "toolName": "sign",
            "toolVersion": "1.0"
          },
          {
            "keyCode": "CP-230012",
            "operationSetCode": "SigntoolVerify",
            "parameters": [],
            "toolName": "sign",
            "toolVersion": "1.0"
          }
        ]
      SessionTimeout: 60
      MaxConcurrency: 50
      MaxRetryAttempts: 5
      PendingAnalysisWaitTimeoutMinutes: 5

# STUB / TEST SIGNING (1st-party): emitted ONLY for the NonOfficial pipeline
# (OfficialBuild: false). Preserves the existing hybrid unchanged — STUB when no
# ESRP test variable group is attached, real TEST signing (CP-466277) when it is.
- ${{ if ne(parameters.OfficialBuild, true) }}:
  # STUB (1st-party): runs when no ESRP test variable group is attached.
  # Mirrors original `task: onebranch.pipeline.signing@1` with profile
  # `${{ parameters.SigningProfile }}` (default `external_distribution`, PROD CP-230012).
  - pwsh: |
      Write-Host '##[warning]STUB: would invoke ESRP signing with profile "${{ parameters.SigningProfile }}"'
      Write-Host '  files_to_sign: **\*.psd1;**\*.psm1;**\*.ps1xml;**\*.ps1;**\*.dll;**\*.exe;**\pwsh'
      Write-Host '  search_root: $(Pipeline.Workspace)/toBeSigned'
      Write-Host ''
      Write-Host 'Files in search_root (would be signed):'
      if (Test-Path '$(Pipeline.Workspace)/toBeSigned') {
        Get-ChildItem -Path '$(Pipeline.Workspace)/toBeSigned' -Recurse -File |
          Select-Object -ExpandProperty FullName |
          ForEach-Object { Write-Host "  $_" }
      } else {
        Write-Host '  (toBeSigned folder does not exist)'
      }
    displayName: 'Sign 1st party files (STUB — ESRP onboarding pending)'
    condition: and(succeeded(), eq(variables['EsrpTestConnectionName'], ''))

  # REAL TEST SIGNING (1st-party): runs only when EsrpSigningTest-PowerShell
  # variable group is attached. Uses MS-Sign Test KeyCode CP-466277.
  - task: EsrpCodeSigning@5
    displayName: 'Sign 1st party files (ESRP test signing)'
    condition: and(succeeded(), ne(variables['EsrpTestConnectionName'], ''))
    inputs:
      ConnectedServiceName: $(EsrpTestConnectionName)
      AppRegistrationClientId: $(EsrpTestAppRegClientId)
      AppRegistrationTenantId: $(EsrpTestAppRegTenantId)
      AuthAKVName: $(EsrpTestAuthAkvName)
      AuthCertName: $(EsrpTestAuthCertName)
      AuthSignCertName: $(EsrpTestAuthSignCertName)
      FolderPath: $(Pipeline.Workspace)/toBeSigned
      Pattern: '**/*.psd1,**/*.psm1,**/*.ps1xml,**/*.ps1,**/*.dll,**/*.exe,**/pwsh'
      UseMinimatch: true
      signConfigType: inlineSignParams
      inlineOperation: |
        [
          {
            "keyCode": "CP-466277",
            "operationSetCode": "SigntoolSign",
            "parameters": [
              { "parameterName": "OpusName", "parameterValue": "Microsoft" },
              { "parameterName": "OpusInfo", "parameterValue": "http://www.microsoft.com" },
              { "parameterName": "PageHash", "parameterValue": "/NPH" },
              { "parameterName": "FileDigest", "parameterValue": "/fd \"SHA256\"" },
              { "parameterName": "TimeStamp", "parameterValue": "/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256" }
            ],
            "toolName": "sign",
            "toolVersion": "1.0"
          },
          {
            "keyCode": "CP-466277",
            "operationSetCode": "SigntoolVerify",
            "parameters": [],
            "toolName": "sign",
            "toolVersion": "1.0"
          }
        ]
      SessionTimeout: 60
      MaxConcurrency: 50
      MaxRetryAttempts: 5
      PendingAnalysisWaitTimeoutMinutes: 5

- pwsh : |
    Get-ChildItem -Path env: | Out-String -width 9999 -Stream | write-Verbose -Verbose
  displayName: Capture environment

- pwsh: |
    Import-Module $(PowerShellRoot)/build.psm1 -Force
    Import-Module $(PowerShellRoot)/tools/packaging -Force

    $BuildPath = (Get-Item '${{ parameters.binPath }}').FullName
    Write-Verbose -Verbose -Message "BuildPath: $BuildPath"

    $officialBuild = [System.Convert]::ToBoolean('${{ parameters.OfficialBuild }}')
    ## copy all files to be signed to build folder
    Update-PSSignedBuildFolder -BuildPath $BuildPath -SignedFilesPath '$(Pipeline.Workspace)/toBeSigned' -OfficialBuild $officialBuild

    $dlls = Get-ChildItem $BuildPath/*.dll, $BuildPath/*.exe -Recurse
    $signatures = $dlls | Get-AuthenticodeSignature
    $officialIssuerPattern = '^CN=(Microsoft Code Signing PCA|Microsoft Root Certificate Authority|Microsoft Corporation).*'
    $testCert = '^CN=(Microsoft|TestAzureEngBuildCodeSign).*'
    $missingSignatures = $signatures | Where-Object { $_.status -eq 'notsigned' -or $_.SignerCertificate.Issuer -notmatch $testCert -or $_.SignerCertificate.Issuer -notmatch $officialIssuerPattern} | select-object -ExpandProperty Path

    Write-Verbose -verbose "to be signed:`r`n $($missingSignatures | Out-String)"

    $filesToSignDirectory = "$(Pipeline.Workspace)/thirdPartyToBeSigned"
    if (Test-Path $filesToSignDirectory) {
      Remove-Item -Path $filesToSignDirectory -Recurse -Force
    }
    $null = New-Item -ItemType Directory -Path $filesToSignDirectory -Force -Verbose

    $missingSignatures | ForEach-Object {
      $pathWithoutLeaf = Split-Path $_
      $relativePath = $pathWithoutLeaf.replace($BuildPath,'')
      Write-Verbose -Verbose -Message "relativePath: $relativePath"
      $targetDirectory = Join-Path -Path $filesToSignDirectory -ChildPath $relativePath
      Write-Verbose -Verbose -Message "targetDirectory: $targetDirectory"
      if(!(Test-Path $targetDirectory))
      {
        $null = New-Item -ItemType Directory -Path $targetDirectory -Force -Verbose
      }
      Copy-Item -Path $_ -Destination $targetDirectory
    }
  displayName: Create ThirdParty Signing Folder

# PROD SIGNING (3rd-party): emitted ONLY for the Official pipeline
# (OfficialBuild: true). Real ESRP 3rd-party Authenticode signing via the
# production connection PowerShell-ESRP-Release against PROD KeyCode CP-231522
# (was $(msft_3rd_party_cert_id)). Compile-time excluded from NonOfficial.
- ${{ if eq(parameters.OfficialBuild, true) }}:
  - task: EsrpCodeSigning@5
    displayName: 'Sign 3rd Party files (ESRP prod signing)'
    condition: succeeded()
    inputs:
      ConnectedServiceName: PowerShell-ESRP-Release
      AppRegistrationClientId: $(EsrpProdAppRegClientId)
      AppRegistrationTenantId: $(EsrpProdAppRegTenantId)
      AuthAKVName: $(EsrpProdAuthAkvName)
      AuthSignCertName: $(EsrpProdAuthSignCertName)
      UseMSIAuthentication: true
      FolderPath: $(Pipeline.Workspace)/thirdPartyToBeSigned
      Pattern: '**/*.dll,**/*.exe'
      UseMinimatch: true
      signConfigType: inlineSignParams
      inlineOperation: |
        [
          {
            "keyCode": "CP-231522",
            "operationSetCode": "SigntoolSign",
            "parameters": [
              { "parameterName": "OpusName", "parameterValue": "Microsoft" },
              { "parameterName": "OpusInfo", "parameterValue": "http://www.microsoft.com" },
              { "parameterName": "PageHash", "parameterValue": "/NPH" },
              { "parameterName": "FileDigest", "parameterValue": "/fd \"SHA256\"" },
              { "parameterName": "TimeStamp", "parameterValue": "/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256" }
            ],
            "toolName": "sign",
            "toolVersion": "1.0"
          },
          {
            "keyCode": "CP-231522",
            "operationSetCode": "SigntoolVerify",
            "parameters": [],
            "toolName": "sign",
            "toolVersion": "1.0"
          }
        ]
      SessionTimeout: 60
      MaxConcurrency: 50
      MaxRetryAttempts: 5
      PendingAnalysisWaitTimeoutMinutes: 5

# STUB / TEST SIGNING (3rd-party): emitted ONLY for the NonOfficial pipeline
# (OfficialBuild: false). Preserves the existing hybrid unchanged.
- ${{ if ne(parameters.OfficialBuild, true) }}:
  # STUB (3rd-party): runs when no ESRP test variable group is attached.
  # Mirrors original `task: onebranch.pipeline.signing@1` with profile
  # `$(msft_3rd_party_cert_id)` (PROD CP-231522, 3rd-party Authenticode).
  - pwsh: |
      Write-Host '##[warning]STUB: would invoke ESRP signing with profile "$(msft_3rd_party_cert_id)" (3rd-party Authenticode)'
      Write-Host '  files_to_sign: **\*.dll;**\*.exe'
      Write-Host '  search_root: $(Pipeline.Workspace)/thirdPartyToBeSigned'
      Write-Host ''
      Write-Host 'Files in search_root (would be signed):'
      if (Test-Path '$(Pipeline.Workspace)/thirdPartyToBeSigned') {
        Get-ChildItem -Path '$(Pipeline.Workspace)/thirdPartyToBeSigned' -Recurse -File |
          Select-Object -ExpandProperty FullName |
          ForEach-Object { Write-Host "  $_" }
      } else {
        Write-Host '  (thirdPartyToBeSigned folder does not exist)'
      }
    displayName: 'Sign 3rd Party files (STUB — ESRP onboarding pending)'
    condition: and(succeeded(), eq(variables['EsrpTestConnectionName'], ''))

  # REAL TEST SIGNING (3rd-party): runs only when EsrpSigningTest-PowerShell
  # variable group is attached. Uses MS-Sign Test KeyCode CP-466279 (different
  # cert chain from 1P so we exercise both signing paths in TEST mode).
  - task: EsrpCodeSigning@5
    displayName: 'Sign 3rd Party files (ESRP test signing)'
    condition: and(succeeded(), ne(variables['EsrpTestConnectionName'], ''))
    inputs:
      ConnectedServiceName: $(EsrpTestConnectionName)
      AppRegistrationClientId: $(EsrpTestAppRegClientId)
      AppRegistrationTenantId: $(EsrpTestAppRegTenantId)
      AuthAKVName: $(EsrpTestAuthAkvName)
      AuthCertName: $(EsrpTestAuthCertName)
      AuthSignCertName: $(EsrpTestAuthSignCertName)
      FolderPath: $(Pipeline.Workspace)/thirdPartyToBeSigned
      Pattern: '**/*.dll,**/*.exe'
      UseMinimatch: true
      signConfigType: inlineSignParams
      inlineOperation: |
        [
          {
            "keyCode": "CP-466279",
            "operationSetCode": "SigntoolSign",
            "parameters": [
              { "parameterName": "OpusName", "parameterValue": "Microsoft" },
              { "parameterName": "OpusInfo", "parameterValue": "http://www.microsoft.com" },
              { "parameterName": "PageHash", "parameterValue": "/NPH" },
              { "parameterName": "FileDigest", "parameterValue": "/fd \"SHA256\"" },
              { "parameterName": "TimeStamp", "parameterValue": "/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256" }
            ],
            "toolName": "sign",
            "toolVersion": "1.0"
          },
          {
            "keyCode": "CP-466279",
            "operationSetCode": "SigntoolVerify",
            "parameters": [],
            "toolName": "sign",
            "toolVersion": "1.0"
          }
        ]
      SessionTimeout: 60
      MaxConcurrency: 50
      MaxRetryAttempts: 5
      PendingAnalysisWaitTimeoutMinutes: 5

- pwsh: |
    Get-ChildItem '$(Pipeline.Workspace)/thirdPartyToBeSigned/*'
  displayName: Capture ThirdParty Signed files

- pwsh: |
    $officialBuild = [System.Convert]::ToBoolean('${{ parameters.OfficialBuild }}')
    $vPackScenario = [System.Convert]::ToBoolean('${{ parameters.vPackScenario }}')
    Import-Module '$(PowerShellRoot)/build.psm1' -Force
    Import-Module '$(PowerShellRoot)/tools/packaging' -Force
    $isGlobalTool = '${{ parameters.globalTool }}' -eq 'true'

    if ($vPackScenario) {
      Write-Verbose -Verbose -Message "vPackScenario is true, copying to $(ob_outputDirectory)"
      $pathForUpload = New-Item -ItemType Directory -Path '$(ob_outputDirectory)' -Force
      Write-Verbose -Verbose -Message "pathForUpload: $pathForUpload"
      Copy-Item -Path '${{ parameters.binPath }}\*' -Destination $pathForUpload -Recurse -Force -Verbose
      Write-Verbose -Verbose -Message "Files copied to $pathForUpload"
    }
    elseif (-not $isGlobalTool) {
      $pathForUpload = New-Item -ItemType Directory -Path '$(ob_outputDirectory)/Signed-$(Runtime)' -Force
      Write-Verbose -Verbose -Message "pathForUpload: $pathForUpload"
      Copy-Item -Path '${{ parameters.binPath }}\*' -Destination $pathForUpload -Recurse -Force -Verbose
      Write-Verbose -Verbose -Message "Files copied to $pathForUpload"
    }
    else {
      $pathForUpload = '${{ parameters.binPath }}'
    }

    Write-Verbose "Copying third party signed files to the build folder"
    $thirdPartySignedFilesPath = (Get-Item '$(Pipeline.Workspace)/thirdPartyToBeSigned').FullName
    Update-PSSignedBuildFolder -BuildPath $pathForUpload -SignedFilesPath $thirdPartySignedFilesPath -OfficialBuild $officialBuild

  displayName: 'Copy signed files for upload'

- template: /.pipelines/templates/step/finalize.yml@self
