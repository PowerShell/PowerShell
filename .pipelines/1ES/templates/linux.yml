parameters:
  Runtime: 'linux-x64'
  BuildConfiguration: 'release'
  JobName: 'build_linux'

# 1ES PT translation of /.pipelines/templates/linux.yml.
# Two jobs:
#   1. build_<JobName> — Linux pool (PowerShell1ES + PSMMSUbuntu22.04-Secure)
#   2. sign_<JobName>  — Windows pool (PowerShell1ES + MMS2022), STUBBED ESRP signing.
#
# POOL CHOICE (Linux): PowerShell1ES + PSMMSUbuntu22.04-Secure + os: linux.
# PowerShell is in the C+AI org; we use ONLY team-owned pools. We do NOT use
# shared pools from other orgs (e.g., E+D's Azure-Pipelines-1ESPT-ExDShared)
# even when they're convenient — that's a governance violation.
#
# KNOWN BLOCKER: PSMMSUbuntu22.04-Secure as currently built lacks the
# `1es-pt-prerequisites` artifact. The bicep declaration and image deployment
# succeed, but the 1ES PT pre-job validator rejects every job that lands on it
# with: "Using an image without 1es-pt-prerequisites artifact is not allowed"
# (https://aka.ms/1espt/image-prerequisites). Build #685762 hit this.
# RESOLUTION: PsImageFactory PR is required to bake the `1es-pt-prerequisites`
# artifact into the PSMMSUbuntu22.04-Secure image build, then redeploy to
# PowerShell1ES. This file should not be merged/run until that's done.
#
# Notes
# -----
#  - CodeQL3000Init / CodeQL3000Finalize tasks DROPPED. 1ES PT auto-injects CodeQL
#    based on `sdl.codeql` settings (configured at the pipeline-extends level in the
#    entry .yml). Manual init/finalize is no longer needed.
#  - cloneToOfficialPath.yml replaced with stage-repo-under-PowerShell.yml.
#  - Artifact naming preserved: `drop_linux_build_${{ parameters.JobName }}` matches the
#    OneBranch auto-generated name that the sign job downloads.

jobs:
- job: build_${{ parameters.JobName }}
  displayName: Build_Linux_${{ parameters.Runtime }}_${{ parameters.BuildConfiguration }}
  condition: succeeded()
  pool:
    name: PowerShell1ES
    image: PSMMSUbuntu22.04-Secure
    os: linux
  variables:
  - name: NugetSecurityAnalysisWarningLevel
    value: none
  - name: DOTNET_NOLOGO
    value: 1
  - group: DotNetPrivateBuildAccess
  - name: ob_outputDirectory
    value: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT'
  - name: BUILDCONFIGURATION
    value: ${{ parameters.BuildConfiguration }}
  - name: Runtime
    value: ${{ parameters.Runtime }}
  - name: PowerShellRoot
    value: '$(Build.SourcesDirectory)/PowerShell'

  templateContext:
    sdl:
      codeSignValidation:
        enabled: false
      binskim:
        enabled: true
      tsa:
        configFile: $(Build.SourcesDirectory)/PowerShell/.config/tsaoptions.json
      credscan:
        suppressionsFile: $(Build.SourcesDirectory)/PowerShell/.config/suppress.json
      sbom:
        packageName: 'Microsoft.Powershell.Linux.${{ parameters.Runtime }}'
      codeql:
        compiled:
          enabled: false
    outputs:
    - output: pipelineArtifact
      targetPath: $(ob_outputDirectory)
      artifactName: drop_linux_build_${{ parameters.JobName }}

  steps:
  - checkout: self
    clean: true

  - template: /.pipelines/templates/SetVersionVariables.yml@self
    parameters:
      ReleaseTagVar: $(ReleaseTagVar)
      ob_restore_phase: false

  - template: /.pipelines/1ES/templates/stage-repo-under-PowerShell.yml@self

  - template: /.pipelines/1ES/templates/insert-nuget-config-azfeed.yml@self
    parameters:
      repoRoot: $(PowerShellRoot)

  - template: /.pipelines/templates/install-dotnet.yml@self

  - pwsh: |
      $runtime = $env:RUNTIME

      $params = @{}
      if ($env:BUILDCONFIGURATION -eq 'minSize') {
        Write-Verbose -Message "Building for minimal size"
        $params['ForMinimalSize'] = $true
      }

      Write-Verbose -Message "Building PowerShell with Runtime: $runtime"
      Import-Module -Name $(PowerShellRoot)/build.psm1 -Force
      $buildWithSymbolsPath = New-Item -ItemType Directory -Path $(Pipeline.Workspace)/Symbols_$(Runtime) -Force

      $null = New-Item -ItemType Directory -Path $buildWithSymbolsPath -Force -Verbose

      $ReleaseTagParam = @{}

      if ($env:RELEASETAGVAR) {
        $ReleaseTagParam['ReleaseTag'] = $env:RELEASETAGVAR
      }

      Start-PSBuild -Runtime $runtime -Configuration Release -Output $buildWithSymbolsPath @params -Clean -PSModuleRestore @ReleaseTagParam

      $outputPath = Join-Path '$(ob_outputDirectory)' 'psoptions'
      $null = New-Item -ItemType Directory -Path $outputPath -Force
      $psOptPath = "$outputPath/psoptions.json"
      Save-PSOptions -PSOptionsPath $psOptPath

      Write-Verbose -Verbose "Verifying pdbs exist in build folder"
      $pdbs = Get-ChildItem -Path $buildWithSymbolsPath -Recurse -Filter *.pdb
      if ($pdbs.Count -eq 0) {
        Write-Error -Message "No pdbs found in build folder"
      }
      else {
        Write-Verbose -Verbose "Found $($pdbs.Count) pdbs in build folder"
        $pdbs | ForEach-Object {
          Write-Verbose -Verbose "Pdb: $($_.FullName)"
        }
      }

      Write-Verbose -Verbose "Completed building PowerShell for '$env:BUILDCONFIGURATION' configuration"
    displayName: 'Build Linux - $(Runtime)'
    env:
      __DOTNET_RUNTIME_FEED_KEY: $(RUNTIME_SOURCEFEED_KEY)

  - pwsh: |
      $platform = 'linux'
      $vstsCommandString = "vso[task.setvariable variable=ArtifactPlatform]$platform"
      Write-Host ("sending " + $vstsCommandString)
      Write-Host "##$vstsCommandString"
    displayName: Set artifact platform

  - pwsh: |
      $pathForUpload = New-Item -ItemType Directory -Path '$(ob_outputDirectory)/Unsigned-$(Runtime)' -Force
      Write-Verbose -Verbose -Message "pathForUpload: $pathForUpload"
      Copy-Item -Path '$(Pipeline.Workspace)/Symbols_$(Runtime)/*' -Destination $pathForUpload -Recurse -Force -Verbose
    displayName: Copy unsigned files for upload

  - template: /.pipelines/templates/step/finalize.yml@self

- job: sign_${{ parameters.JobName }}
  displayName: Sign_Linux_${{ parameters.Runtime }}_${{ parameters.BuildConfiguration }}
  condition: succeeded()
  dependsOn: build_${{ parameters.JobName }}
  pool:
    name: PowerShell1ES
    image: MMS2022
    os: windows
  variables:
  - name: NugetSecurityAnalysisWarningLevel
    value: none
  - name: DOTNET_NOLOGO
    value: 1
  - group: DotNetPrivateBuildAccess
  - group: certificate_logical_to_actual
  - name: ob_outputDirectory
    value: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT'
  - name: BuildConfiguration
    value: ${{ parameters.BuildConfiguration }}
  - name: Runtime
    value: ${{ parameters.Runtime }}
  - name: PowerShellRoot
    value: '$(Build.SourcesDirectory)\PowerShell'

  templateContext:
    sdl:
      codeSignValidation:
        enabled: false
      binskim:
        enabled: false
      tsa:
        configFile: $(Build.SourcesDirectory)\PowerShell\.config\tsaoptions.json
      credscan:
        suppressionsFile: $(Build.SourcesDirectory)\PowerShell\.config\suppress.json
      codeql:
        compiled:
          enabled: false
    outputs:
    - output: pipelineArtifact
      targetPath: $(ob_outputDirectory)
      artifactName: drop_linux_sign_${{ parameters.JobName }}

  steps:
  - checkout: self
    clean: true

  - template: /.pipelines/templates/SetVersionVariables.yml@self
    parameters:
      ReleaseTagVar: $(ReleaseTagVar)
      ob_restore_phase: false

  - template: /.pipelines/1ES/templates/stage-repo-under-PowerShell.yml@self

  - task: DownloadPipelineArtifact@2
    inputs:
      artifact: drop_linux_build_${{ parameters.JobName }}
      path: $(Pipeline.Workspace)/drop_linux_build
    displayName: Download build

  - pwsh: |
      Get-ChildItem -Path $(Pipeline.Workspace)/drop_linux_build -Recurse
    displayName: Capture downloaded files

  - pwsh: |
      $pwshPath = Get-ChildItem -Path $(Pipeline.Workspace)/drop_linux_build -File -Recurse | Where-Object { $_.Name -eq 'pwsh' }
      $rootPath = Split-Path -Path $pwshPath.FullName -Parent
      Write-Verbose -Verbose "Setting vso[task.setvariable variable=DropRootPath]$rootPath"
      Write-Host "##vso[task.setvariable variable=DropRootPath]$rootPath"
    displayName: Set drop root path

  - template: /.pipelines/1ES/templates/obp-file-signing.yml@self
    parameters:
      binPath: $(DropRootPath)
      OfficialBuild: $(ps_official_build)

  - template: /.pipelines/templates/step/finalize.yml@self
